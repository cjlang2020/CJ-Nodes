<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词选择器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            background: #f5f7fa;
            font-family: Arial, sans-serif;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .tab-bar {
            display: flex;
            background: #e9ecef;
            border-bottom: 1px solid #dee2e6;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab-item {
            padding: 5px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 12px;
            color: #495057;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-item.active {
            border-bottom-color: #2d5aff;
            color: #2d5aff;
            font-weight: 600;
        }
        .tab-item:hover {
            background: #dee2e6;
        }
        .content-container {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            background: white;
        }
        .second-level-title {
            font-size: 14px;
            font-weight: 600;
            color: #4a6fa5;
            margin: 8px 0 4px 0;
            padding: 3px 6px;
            background: #e3f2fd;
            border-radius: 4px;
            display: inline-block;
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 2px 4px;
            margin-bottom: 8px;
        }
        .tag-btn {
            padding: 2px 6px;
            background: #e8f3ff;
            border: 1px solid #b3d8ff;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            color: #333;
            white-space: nowrap;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .tag-btn:hover {
            background: #d1e7ff;
        }
        .tag-btn.active {
            background: #2d5aff;
            color: white;
            border-color: #2d5aff;
        }
        .tag-btn.active:hover {
            background: #1a46e0;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="tab-bar" id="tabBar"></div>
    <div class="content-container" id="contentContainer"></div>
    <script src="/CJ-Nodes/js/sdxl.js"></script>
    <script>
        const keysWord = SDXLWord;
        let selectedPrompts = [];
        let activeTabIndex = 0;

        function initTabBar() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            keysWord.forEach((item, index) => {
                const tabItem = document.createElement('button');
                tabItem.className = 'tab-item';
                tabItem.textContent = item.name;
                tabItem.dataset.index = index;
                if (index === activeTabIndex) {
                    tabItem.classList.add('active');
                }
                tabItem.addEventListener('click', () => {
                    switchTab(index);
                });
                tabBar.appendChild(tabItem);
            });
        }

        function switchTab(index) {
            activeTabIndex = index;
            document.querySelectorAll('.tab-item').forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            renderContent(index);
        }

        function renderContent(tabIndex) {
            const contentContainer = document.getElementById('contentContainer');
            const currentData = keysWord[tabIndex];
            if (!currentData || !currentData.child.length) {
                contentContainer.innerHTML = '<div class="empty-tip">暂无内容</div>';
                return;
            }
            contentContainer.innerHTML = '';
            currentData.child.forEach(secondLevel => {
                const secondLevelEl = document.createElement('div');
                secondLevelEl.className = 'second-level-title';
                secondLevelEl.textContent = secondLevel.name;
                contentContainer.appendChild(secondLevelEl);
                const tagContainer = document.createElement('div');
                tagContainer.className = 'tag-container';
                secondLevel.child.forEach(tagItem => {
                    const tagBtn = document.createElement('button');
                    tagBtn.className = 'tag-btn';
                    tagBtn.textContent = tagItem.word;
                    if (selectedPrompts.includes(tagItem.word)) {
                        tagBtn.classList.add('active');
                    }
                    tagBtn.addEventListener('click', () => {
                        if (selectedPrompts.includes(tagItem.word)) {
                            selectedPrompts = selectedPrompts.filter(p => p !== tagItem.word);
                            tagBtn.classList.remove('active');
                        } else {
                            selectedPrompts.push(tagItem.word);
                            tagBtn.classList.add('active');
                        }
                        sendPromptUpdate();
                    });
                    tagContainer.appendChild(tagBtn);
                });
                contentContainer.appendChild(tagContainer);
            });
        }

        function sendPromptUpdate() {
            const finalPrompt = selectedPrompts.join(', ');
            window.parent.postMessage({
                type: 'PROMPT_UPDATE',
                prompt: finalPrompt
            }, '*');
        }

        function initPrompt(initialPrompt = "") {
            if (initialPrompt) {
                selectedPrompts = initialPrompt.split(",").map(p => p.trim()).filter(p => p);
            }
            renderContent(activeTabIndex);
        }

        window.addEventListener('message', (e) => {
            try {
                const data = e.data;
                if (data.type === 'INIT_PROMPT') {
                    initPrompt(data.prompt || "");
                } else if (data.type === 'RESIZE_PANEL') {
                    document.body.style.height = '100%';
                }
            } catch (e) {
                console.error('处理父窗口消息失败:', e);
            }
        });

        initTabBar();
        renderContent(activeTabIndex);

        setTimeout(() => {
            window.parent.postMessage({type: 'PROMPT_PANEL_READY'}, '*');
        }, 100);
    </script>
</body>
</html>
