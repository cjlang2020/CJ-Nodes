<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Design (图层绘画)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            margin: 0;
            cursor: default;
        }
        #main-toolbar {
            padding: 6px 10px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a4a;
            z-index: 30;
            user-select: none;
        }
        .tool-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .tool-btn {
            padding: 5px;
            min-width: 30px;
            height: 30px;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
            background: rgba(255,255,255,0.06);
            color: #aaa;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            position: relative;
        }
        .tool-btn svg { width: 18px; height: 18px; }
        .tool-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: #fff; }
        .tool-btn.active { background: #2ecc71; color: #fff; box-shadow: 0 0 12px rgba(46, 204, 113, 0.25); border-color: rgba(46, 204, 113, 0.3); }
        .tool-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        #upload-btn { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        #upload-btn:hover:not(:disabled) { background: rgba(46, 204, 113, 0.3); }
        #clear-btn { color: #e74c3c; }

        #workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #cccccc;
            padding: 10px;
            position: relative;
        }
        #edit-canvas {
            border: 2px solid #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            touch-action: none;
            user-select: none;
            background: #f8f8f8;
            display: none;
            cursor: crosshair;
        }
        #brush-preview {
            position: absolute;
            border: 2px solid #0099ff;
            border-radius: 50%;
            background: rgba(0, 153, 255, 0.1);
            pointer-events: none;
            z-index: 20;
            display: none;
            transform: translate(-50%, -50%);
        }
        #status {
            padding: 4px 10px;
            background: #12121f;
            color: #2ecc71;
            font-size: 12px;
            text-align: left;
            flex-shrink: 0;
        }
        #image-input { display: none; }

        /* 图层面板 */
        #layer-panel {
            width: 160px;
            background: #1e1e32;
            border-left: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #layer-panel-header {
            padding: 8px 10px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            flex-shrink: 0;
        }
        #layer-panel-header span {
            color: #ccc;
            font-size: 12px;
            font-weight: bold;
        }
        .layer-header-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.08);
            color: #aaa;
            transition: all 0.15s;
        }
        .layer-header-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .layer-header-btn.danger:hover { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }
        #layer-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
        }
        #layer-list::-webkit-scrollbar { width: 4px; }
        #layer-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.12s;
            margin-bottom: 2px;
            border: 2px solid transparent;
        }
        .layer-item:hover { background: rgba(255,255,255,0.06); }
        .layer-item.selected {
            background: rgba(46, 204, 113, 0.12);
            border-color: rgba(46, 204, 113, 0.4);
        }
        .layer-thumb {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.12);
            background: #EEEEEE;
            object-fit: contain;
            flex-shrink: 0;
        }
        .layer-name {
            font-size: 11px;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="main-toolbar">
        <div class="tool-group">
            <input type="file" id="image-input" accept="image/*">
            <button id="upload-btn" class="tool-btn" title="上传图片">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 9l5 -5l5 5"/><path d="M12 4l0 12"/></svg>
            </button>
            <button id="clear-btn" class="tool-btn" title="清除画布">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7l16 0"/><path d="M10 11l0 6"/><path d="M14 11l0 6"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg>
            </button>
            <button id="reset-btn" class="tool-btn" title="重置初始尺寸">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg>
            </button>
        </div>
        <div class="tool-group">
            <button id="draw-btn" class="tool-btn active" title="画笔">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21v-4a4 4 0 1 1 4 4h-4"/><path d="M21 3a16 16 0 0 0 -12.8 10.2"/><path d="M21 3a16 16 0 0 1 -10.2 12.8"/><path d="M10.6 9a9 9 0 0 1 4.4 4.4"/></svg>
            </button>
        </div>
    </div>

    <div id="workspace">
        <div id="canvas-container">
            <canvas id="edit-canvas"></canvas>
            <div id="brush-preview"></div>
        </div>
        <div id="layer-panel">
            <div id="layer-panel-header">
                <span>图层</span>
                <div>
                    <button id="layer-add-btn" class="layer-header-btn" title="新增图层">+</button>
                    <button id="layer-del-btn" class="layer-header-btn danger" title="删除选中图层">🗑</button>
                </div>
            </div>
            <div id="layer-list"></div>
        </div>
    </div>

    <div id="status">🟢 图层绘画就绪 | 左键绘制新图层 | 右键拖拽移动图层 | 拖拽右侧列表调整顺序</div>

    <script>
        let layerIdCounter = 0;
        function genId() { return 'layer_' + (++layerIdCounter); }

        const state = {
            currentTool: 'draw',
            isUploaded: false,
            isMouseDown: false,
            isDragging: false,       // 正在拖动图层
            dragLayer: null,         // 被拖动的图层对象
            dragStartX: 0,
            dragStartY: 0,
            dragLayerStartX: 0,
            dragLayerStartY: 0,
            ctx: null,
            canvas: null,
            originalImage: null,
            canvasW: 512,
            canvasH: 512,
            initialW: 512,
            initialH: 512,
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            toolbarHeight: 0,
            drawSize: 5,
            drawColor: '#000000',
            drawAlpha: 1.0,
            prevDrawX: 0,
            prevDrawY: 0,
            brushPreview: null,
            finalImageBase64: "",
            cropWidth: 512,
            cropHeight: 512,
            zoom: 1.0,
            panX: 0,
            panY: 0,
            isPanning: false,
            panStartX: 0,
            panStartY: 0,
            panStartPanX: 0,
            panStartPanY: 0,
            resizeObserver: null,

            // 图层系统
            layers: [],
            selectedLayerId: null,
            // 当前绘制临时数据
            drawing: false,
            tempCanvas: null,
            tempCtx: null,
            strokePoints: [],
            strokeBounds: null,
            strokeDarkColor: '',
            strokeLightColor: '',
            undoStack: [],
            maxUndo: 30
        };

        // ========= 图层操作 =========

        function addLayer(canvasData, x, y, w, h, name) {
            const offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            const octx = offscreen.getContext('2d');
            if (canvasData) {
                if (canvasData instanceof HTMLCanvasElement || canvasData instanceof OffscreenCanvas) {
                    octx.drawImage(canvasData, 0, 0);
                } else if (typeof canvasData === 'string') {
                    const img = new Image();
                    img.onload = () => { octx.drawImage(img, 0, 0); updateLayerThumb(layer); renderComposition(); };
                    img.src = canvasData;
                }
            }
            const layer = {
                id: genId(),
                name: name || ('图层 ' + (state.layers.length + 1)),
                canvas: offscreen,
                ctx: octx,
                x: x || 0,
                y: y || 0,
                w: w,
                h: h,
                selected: false
            };
            state.layers.push(layer);
            selectLayer(layer.id);
            renderComposition();
            renderLayerPanel();
            return layer;
        }

        function deleteLayer(id) {
            const idx = state.layers.findIndex(l => l.id === id);
            if (idx === -1) return;
            state.layers.splice(idx, 1);
            if (state.selectedLayerId === id) {
                state.selectedLayerId = state.layers.length > 0 ? state.layers[state.layers.length - 1].id : null;
            }
            renderComposition();
            renderLayerPanel();
        }

        function selectLayer(id) {
            state.layers.forEach(l => l.selected = (l.id === id));
            state.selectedLayerId = id;
            renderLayerPanel();
            if (id) {
                const layer = state.layers.find(l => l.id === id);
                if (layer) setStatus('📦 选中: ' + layer.name + ' | 拖拽移动位置');
            }
        }

        function getLayerById(id) {
            return state.layers.find(l => l.id === id);
        }

        function hitTestLayer(cx, cy) {
            for (let i = state.layers.length - 1; i >= 0; i--) {
                const l = state.layers[i];
                if (cx >= l.x && cx < l.x + l.w && cy >= l.y && cy < l.y + l.h) {
                    return l;
                }
            }
            return null;
        }

        // ========= 渲染合成 =========

        function renderComposition() {
            if (!state.ctx || !state.canvas) return;
            state.ctx.fillStyle = '#EEEEEE';
            state.ctx.fillRect(0, 0, state.canvasW, state.canvasH);

            for (const layer of state.layers) {
                state.ctx.drawImage(layer.canvas, layer.x, layer.y, layer.w, layer.h);
            }

            if (state.drawing && state.tempCanvas) {
                state.ctx.drawImage(state.tempCanvas, 0, 0);
            }
        }

        function updateLayerThumb(layer) {
            const items = document.querySelectorAll('.layer-item');
            for (const item of items) {
                if (item.dataset.layerId === layer.id) {
                    const thumb = item.querySelector('.layer-thumb');
                    if (thumb) thumb.src = layer.canvas.toDataURL();
                    break;
                }
            }
        }

        // ========= 图层面板渲染（支持拖拽排序） =========

        function renderLayerPanel() {
            const list = document.getElementById('layer-list');
            list.innerHTML = '';
            // 从后往前渲染（数组最后一个 = 最上层 = 显示在最顶部）
            for (let i = state.layers.length - 1; i >= 0; i--) {
                const l = state.layers[i];
                const item = document.createElement('div');
                item.className = 'layer-item' + (l.selected ? ' selected' : '');
                item.dataset.layerId = l.id;
                item.draggable = true;
                item.innerHTML = '<img class="layer-thumb" src="' + l.canvas.toDataURL() + '" alt="">' +
                    '<span class="layer-name">' + l.name + '</span>';

                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectLayer(l.id);
                });

                // 拖拽排序
                item.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', l.id);
                    item.style.opacity = '0.4';
                });
                item.addEventListener('dragend', () => {
                    item.style.opacity = '';
                });
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    item.style.borderColor = 'rgba(46,204,113,0.6)';
                });
                item.addEventListener('dragleave', () => {
                    item.style.borderColor = 'transparent';
                });
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    item.style.borderColor = 'transparent';
                    const fromId = e.dataTransfer.getData('text/plain');
                    if (fromId === l.id) return;
                    const fromIdx = state.layers.findIndex(x => x.id === fromId);
                    const toIdx = state.layers.findIndex(x => x.id === l.id);
                    if (fromIdx === -1 || toIdx === -1) return;
                    const [moved] = state.layers.splice(fromIdx, 1);
                    const newToIdx = state.layers.findIndex(x => x.id === l.id);
                    state.layers.splice(newToIdx, 0, moved);
                    renderLayerPanel();
                    renderComposition();
                    sendToParent(false);
                });

                list.appendChild(item);
            }
        }

        // ========= 画布初始化 =========

        function initCanvas(w, h, saveInitial = true) {
            state.canvas = document.getElementById('edit-canvas');
            state.ctx = state.canvas.getContext('2d');
            state.canvas.width = w;
            state.canvas.height = h;
            state.canvasW = w;
            state.canvasH = h;
            if (saveInitial) { state.initialW = w; state.initialH = h; }
            state.canvas.style.display = 'block';
            state.brushPreview = document.getElementById('brush-preview');
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
            state.layers = [];
            state.selectedLayerId = null;
            state.drawing = false;
            state.tempCanvas = null;
            state.tempCtx = null;
            state.strokePoints = [];
            state.strokeBounds = null;
            state.strokeDarkColor = '';
            state.strokeLightColor = '';
            state.ctx.fillStyle = '#EEEEEE';
            state.ctx.fillRect(0, 0, w, h);
            renderLayerPanel();
            updateCanvasScale();
            setStatus('⚙️ 画布初始化完成 | ' + w + 'x' + h + ' | 绘制自动创建图层');
        }

        function updateCanvasScale() {
            if (!state.canvas) return;
            const container = document.getElementById('canvas-container');
            const containerStyle = window.getComputedStyle(container);
            const padL = parseFloat(containerStyle.paddingLeft) || 0;
            const padR = parseFloat(containerStyle.paddingRight) || 0;
            const padT = parseFloat(containerStyle.paddingTop) || 0;
            const padB = parseFloat(containerStyle.paddingBottom) || 0;
            const contW = container.clientWidth - padL - padR;
            const contH = container.clientHeight - padT - padB;
            const fitScaleX = contW / state.canvasW;
            const fitScaleY = contH / state.canvasH;
            const fitScale = Math.min(fitScaleX, fitScaleY);
            state.scale = fitScale * state.zoom;
            const dispW = state.canvasW * state.scale;
            const dispH = state.canvasH * state.scale;
            const baseLeft = (contW - dispW) / 2 + padL;
            const baseTop = (contH - dispH) / 2 + padT;
            state.offsetX = baseLeft + state.panX;
            state.offsetY = baseTop + state.panY;
            state.canvas.style.width = dispW + 'px';
            state.canvas.style.height = dispH + 'px';
            state.canvas.style.left = state.offsetX + 'px';
            state.canvas.style.top = state.offsetY + 'px';
            state.canvas.style.position = 'absolute';
        }

        function getCanvasXY(clientX, clientY) {
            if (!state.canvas) return [0, 0];
            const rect = state.canvas.getBoundingClientRect();
            const x = (clientX - rect.left) / state.scale;
            const y = (clientY - rect.top) / state.scale;
            return [
                Math.max(0, Math.min(state.canvasW, x)),
                Math.max(0, Math.min(state.canvasH, y))
            ];
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function saveCanvasState() {
            try {
                const layerSnapshots = state.layers.map(l => ({
                    id: l.id,
                    name: l.name,
                    x: l.x, y: l.y,
                    w: l.w, h: l.h,
                    dataUrl: l.canvas.toDataURL()
                }));
                state.undoStack.push({
                    layers: layerSnapshots,
                    selectedLayerId: state.selectedLayerId
                });
                if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
            } catch (e) {}
        }

        function restoreLayersFromSnapshot(snap) {
            state.layers = [];
            for (const s of snap) {
                const offscreen = document.createElement('canvas');
                offscreen.width = s.w;
                offscreen.height = s.h;
                const octx = offscreen.getContext('2d');
                const img = new Image();
                img.onload = () => { octx.drawImage(img, 0, 0); renderComposition(); renderLayerPanel(); };
                img.src = s.dataUrl;
                state.layers.push({
                    id: s.id,
                    name: s.name,
                    canvas: offscreen,
                    ctx: octx,
                    x: s.x, y: s.y,
                    w: s.w, h: s.h,
                    selected: false
                });
            }
            state.selectedLayerId = snap.length > 0 ? snap[snap.length - 1].id : null;
            if (state.selectedLayerId) selectLayer(state.selectedLayerId);
            renderComposition();
            renderLayerPanel();
        }

        function getCanvasBase64() {
            renderComposition();
            return state.canvas.toDataURL('image/png', 1.0);
        }

        function sendToParent(shouldUpdateSize = false) {
            state.finalImageBase64 = getCanvasBase64();
            const sendData = {
                final_image_base64: state.finalImageBase64,
                crop_width: state.canvasW,
                crop_height: state.canvasH
            };
            try {
                window.parent.postMessage({
                    type: 'DRAW_DATA_UPDATE',
                    data: JSON.stringify(sendData)
                }, '*');
                if (shouldUpdateSize) {
                    window.parent.postMessage({
                        type: 'UPDATE_CANVAS_SIZE',
                        width: state.canvasW,
                        height: state.canvasH
                    }, '*');
                }
            } catch (e) {
                setStatus('❌ 数据发送失败: ' + e.message);
            }
        }

        function execClear() {
            const layerSnapshot = state.layers.map(l => ({
                id: l.id, name: l.name, x: l.x, y: l.y, w: l.w, h: l.h, dataUrl: l.canvas.toDataURL()
            }));
            state.undoStack.push({ layers: layerSnapshot, selectedLayerId: state.selectedLayerId });

            state.layers = [];
            state.selectedLayerId = null;
            state.drawing = false;
            state.tempCanvas = null;
            state.tempCtx = null;
            state.ctx.fillStyle = '#EEEEEE';
            state.ctx.fillRect(0, 0, state.canvasW, state.canvasH);
            renderLayerPanel();
            sendToParent(false);
            setStatus('🧹 已清除所有图层');
        }

        function execReset() {
            if (state.canvasW === state.initialW && state.canvasH === state.initialH) {
                setStatus('ℹ️ 画布尺寸已是初始尺寸');
                return;
            }
            const layerSnapshot = state.layers.map(l => ({
                id: l.id, name: l.name, x: l.x, y: l.y, w: l.w, h: l.h, dataUrl: l.canvas.toDataURL()
            }));
            state.undoStack.push({ layers: layerSnapshot, selectedLayerId: state.selectedLayerId });

            initCanvas(state.initialW, state.initialH, false);
            sendToParent(true);
            setStatus('🔄 已重置为初始尺寸 | ' + state.initialW + 'x' + state.initialH);
        }

        function hexToRgb(hex) {
            const v = parseInt(hex.slice(1), 16);
            return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
        }

        function rgbStr(r, g, b) { return `rgb(${r},${g},${b})`; }

        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r, g, b;
            if (h < 60) { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }
            const toHex = (n) => {
                const hex = Math.round((n + m) * 255).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            };
            return '#' + toHex(r) + toHex(g) + toHex(b);
        }

        function darkenColor(hex, factor) {
            const [r, g, b] = hexToRgb(hex);
            return rgbStr(
                Math.round(r * factor),
                Math.round(g * factor),
                Math.round(b * factor)
            );
        }

        function lightenColor(hex, factor) {
            const [r, g, b] = hexToRgb(hex);
            return rgbStr(
                Math.round(255 - (255 - r) * factor),
                Math.round(255 - (255 - g) * factor),
                Math.round(255 - (255 - b) * factor)
            );
        }



        function updateBrushPreviewSize() {
            if (!state.brushPreview) return;
            const displaySize = state.drawSize * state.scale * 2;
            state.brushPreview.style.width = displaySize + 'px';
            state.brushPreview.style.height = displaySize + 'px';
        }

        function updateBrushPreviewPos(clientX, clientY) {
            if (!state.brushPreview) return;
            const adjustedY = clientY - state.toolbarHeight;
            state.brushPreview.style.left = clientX + 'px';
            state.brushPreview.style.top = adjustedY + 'px';
        }

        // ========= 绘制转图层 =========

        function startDrawing(x, y) {
            state.drawing = true;
            state.strokePoints = [{x, y}];
            state.strokeBounds = { minX: x, minY: y, maxX: x, maxY: y };

            state.tempCanvas = document.createElement('canvas');
            state.tempCanvas.width = state.canvasW;
            state.tempCanvas.height = state.canvasH;
            state.tempCtx = state.tempCanvas.getContext('2d');

            state.prevDrawX = x;
            state.prevDrawY = y;
        }

        function continueDrawing(x, y) {
            if (!state.drawing || !state.tempCtx) return;
            state.strokePoints.push({x, y});

            // 预览：绘制细线轨迹
            state.tempCtx.save();
            state.tempCtx.strokeStyle = 'rgba(0,0,0,0.25)';
            state.tempCtx.lineWidth = 1;
            state.tempCtx.beginPath();
            state.tempCtx.moveTo(state.prevDrawX, state.prevDrawY);
            state.tempCtx.lineTo(x, y);
            state.tempCtx.stroke();
            state.tempCtx.restore();

            state.prevDrawX = x;
            state.prevDrawY = y;

            const b = state.strokeBounds;
            if (x < b.minX) b.minX = x;
            if (y < b.minY) b.minY = y;
            if (x > b.maxX) b.maxX = x;
            if (y > b.maxY) b.maxY = y;
        }

        function finishDrawing() {
            if (!state.drawing) return;
            state.drawing = false;

            const points = state.strokePoints;
            state.tempCanvas = null;
            state.tempCtx = null;

            if (points.length < 2) {
                renderComposition();
                return;
            }

            const b = state.strokeBounds;
            const padding = Math.max(10, state.drawSize);
            let lx = Math.max(0, Math.floor(b.minX) - padding);
            let ly = Math.max(0, Math.floor(b.minY) - padding);
            let rx = Math.min(state.canvasW, Math.ceil(b.maxX) + padding);
            let ry = Math.min(state.canvasH, Math.ceil(b.maxY) + padding);
            const lw = rx - lx;
            const lh = ry - ly;

            if (lw < 4 || lh < 4) {
                renderComposition();
                return;
            }

            const layerCanvas = document.createElement('canvas');
            layerCanvas.width = lw;
            layerCanvas.height = lh;
            const lctx = layerCanvas.getContext('2d');

            // 随机生成该图层的主色（HSL 随机色相）
            const hue = Math.floor(Math.random() * 360);
            const sat = 60 + Math.floor(Math.random() * 40);
            const lig = 40 + Math.floor(Math.random() * 30);
            const mainColor = hslToHex(hue, sat, lig);

            // 随机深色描边（同色系更暗）
            const edgeColor = darkenColor(mainColor, 0.3 + Math.random() * 0.3);

            // 构建闭合路径（坐标系转换到图层本地）
            lctx.beginPath();
            lctx.moveTo(points[0].x - lx, points[0].y - ly);
            for (let i = 1; i < points.length; i++) {
                lctx.lineTo(points[i].x - lx, points[i].y - ly);
            }
            lctx.closePath();

            // 内部填充：随机主色 30% 透明度
            const [fr, fg, fb] = hexToRgb(mainColor);
            lctx.fillStyle = `rgba(${fr},${fg},${fb},0.3)`;
            lctx.fill();

            // 边缘描边：同色系深色
            lctx.strokeStyle = edgeColor;
            lctx.lineWidth = Math.max(1.5, state.drawSize * 0.25);
            lctx.stroke();

            addLayer(layerCanvas, lx, ly, lw, lh);
            sendToParent(false);
            setStatus('✅ 图层已创建 | 位置: (' + lx + ',' + ly + ') 尺寸: ' + lw + 'x' + lh);
        }

        // ========= 事件初始化 =========

        function initEvent() {
            document.getElementById('upload-btn').addEventListener('click', () => {
                document.getElementById('image-input').click();
            });
            document.getElementById('image-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        initCanvas(img.width, img.height, false);
                        state.ctx.drawImage(img, 0, 0);
                        const fullCanvas = document.createElement('canvas');
                        fullCanvas.width = img.width;
                        fullCanvas.height = img.height;
                        const fctx = fullCanvas.getContext('2d');
                        fctx.drawImage(img, 0, 0);
                        addLayer(fullCanvas, 0, 0, img.width, img.height, '上传图片');
                        sendToParent(true);
                        setStatus('✅ 图片上传成功 | ' + img.width + 'x' + img.height);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('clear-btn').onclick = () => execClear();
            document.getElementById('reset-btn').onclick = () => execReset();
            document.getElementById('draw-btn').onclick = () => { state.currentTool = 'draw'; setStatus('🖌️ 画笔工具'); };

            document.getElementById('layer-add-btn').addEventListener('click', () => {
                const emptyCanvas = document.createElement('canvas');
                emptyCanvas.width = 100;
                emptyCanvas.height = 100;
                const ectx = emptyCanvas.getContext('2d');
                ectx.fillStyle = '#EEEEEE';
                ectx.fillRect(0, 0, 100, 100);
                addLayer(emptyCanvas, 50, 50, 100, 100, '图层 ' + (state.layers.length + 1));
                setStatus('➕ 已新增空白图层');
            });

            document.getElementById('layer-del-btn').addEventListener('click', () => {
                if (state.selectedLayerId) {
                    const layer = getLayerById(state.selectedLayerId);
                    if (layer) {
                        deleteLayer(state.selectedLayerId);
                        setStatus('🗑 已删除: ' + layer.name);
                        sendToParent(false);
                    }
                }
            });

            // 鼠标事件
            document.addEventListener('mousemove', (e) => {
                if (state.isPanning) {
                    state.panX = state.panStartPanX + (e.clientX - state.panStartX);
                    state.panY = state.panStartPanY + (e.clientY - state.panStartY);
                    updateCanvasScale();
                    return;
                }

                updateBrushPreviewPos(e.clientX, e.clientY);

                if (!state.isMouseDown) return;
                const [x, y] = getCanvasXY(e.clientX, e.clientY);

                if (state.isDragging && state.dragLayer) {
                    const dx = (e.clientX - state.dragStartX) / state.scale;
                    const dy = (e.clientY - state.dragStartY) / state.scale;
                    state.dragLayer.x = Math.max(0, Math.min(state.canvasW - state.dragLayer.w, state.dragLayerStartX + dx));
                    state.dragLayer.y = Math.max(0, Math.min(state.canvasH - state.dragLayer.h, state.dragLayerStartY + dy));
                    renderComposition();
                    return;
                }

                if (state.currentTool === 'draw' && state.drawing) {
                    continueDrawing(x, y);
                    renderComposition();
                }
            });

            const canvas = document.getElementById('edit-canvas');
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                // 中键 = 平移
                if (e.button === 1) {
                    state.isPanning = true;
                    state.panStartX = e.clientX;
                    state.panStartY = e.clientY;
                    state.panStartPanX = state.panX;
                    state.panStartPanY = state.panY;
                    state.canvas.style.cursor = 'grabbing';
                    return;
                }

                state.isMouseDown = true;
                const [x, y] = getCanvasXY(e.clientX, e.clientY);

                if (state.currentTool === 'draw') {
                    // 左键 = 绘制新图层
                    if (e.button === 0) {
                        startDrawing(x, y);
                        renderComposition();
                        state.brushPreview.style.display = 'none';
                        setStatus('✏️ 正在绘制... 松开鼠标创建图层');
                    }
                    // 右键 = 拖拽已有图层
                    else if (e.button === 2) {
                        const hit = hitTestLayer(x, y);
                        if (hit) {
                            state.isDragging = true;
                            state.dragLayer = hit;
                            state.dragStartX = e.clientX;
                            state.dragStartY = e.clientY;
                            state.dragLayerStartX = hit.x;
                            state.dragLayerStartY = hit.y;
                            selectLayer(hit.id);
                            renderComposition();
                            state.canvas.style.cursor = 'move';
                            setStatus('↕️ 正在移动: ' + hit.name);
                        }
                    }
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (state.isPanning) {
                    state.isPanning = false;
                    state.canvas.style.cursor = 'crosshair';
                    return;
                }
                if (state.isDragging) {
                    state.isDragging = false;
                    state.dragLayer = null;
                    state.canvas.style.cursor = 'crosshair';
                    renderComposition();
                    sendToParent(false);
                    setStatus('✅ 图层已移动');
                    return;
                }
                if (!state.isMouseDown) return;
                state.isMouseDown = false;

                if (state.currentTool === 'draw' && state.drawing) {
                    finishDrawing();
                    state.brushPreview.style.display = 'block';
                }
            });

            canvas.addEventListener('mouseenter', (e) => {
                if (e.buttons === 1 && state.isMouseDown === false && state.currentTool === 'draw') {
                    state.isMouseDown = true;
                    const [x, y] = getCanvasXY(e.clientX, e.clientY);
                    startDrawing(x, y);
                    renderComposition();
                }
            });

            window.addEventListener('resize', () => {
                state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                updateCanvasScale();
                updateBrushPreviewSize();
            });

            if (window.ResizeObserver) {
                state.resizeObserver = new ResizeObserver(() => {
                    state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                    updateCanvasScale();
                    updateBrushPreviewSize();
                });
                state.resizeObserver.observe(document.getElementById('canvas-container'));
            }

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const oldScale = state.scale;
                const rect = state.canvas.getBoundingClientRect();
                const canvasPX = (e.clientX - rect.left) / oldScale;
                const canvasPY = (e.clientY - rect.top) / oldScale;
                const factor = e.deltaY > 0 ? 1 / 1.12 : 1.12;
                state.zoom = Math.max(0.1, Math.min(20, state.zoom * factor));
                updateCanvasScale();
                const newRect = state.canvas.getBoundingClientRect();
                state.panX += (e.clientX - newRect.left) - canvasPX * state.scale;
                state.panY += (e.clientY - newRect.top) - canvasPY * state.scale;
                updateCanvasScale();
                updateBrushPreviewSize();
                setStatus('🔍 缩放: ' + Math.round(state.zoom * 100) + '%');
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    if (state.undoStack.length > 0) {
                        const snap = state.undoStack.pop();
                        restoreLayersFromSnapshot(snap.layers);
                        sendToParent(false);
                        setStatus('↩️ 已撤销');
                    }
                }
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (state.selectedLayerId && !e.target.closest('input')) {
                        const layer = getLayerById(state.selectedLayerId);
                        if (layer) {
                            deleteLayer(state.selectedLayerId);
                            setStatus('🗑 已删除: ' + layer.name);
                            sendToParent(false);
                        }
                    }
                }
            });
        }

        // ========= 启动 =========

        window.onload = () => {
            initCanvas(512, 512, false);
            initEvent();
            setTimeout(() => {
                window.parent.postMessage({type: 'DRAW_CANVAS_READY'}, '*');
            }, 100);
        };

        window.addEventListener('unload', () => {
            if (state.resizeObserver) state.resizeObserver.disconnect();
        });

        window.addEventListener('message', (e) => {
            try {
                if (e.data.type === 'INIT_CANVAS') {
                    initCanvas(e.data.width || 512, e.data.height || 512, true);
                } else if (e.data.type === 'RESIZE_CANVAS') {
                    state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                    updateCanvasScale();
                    updateBrushPreviewSize();
                }
            } catch (e) {
                console.error('处理父窗口消息失败:', e);
            }
        });
    </script>
</body>
</html>
