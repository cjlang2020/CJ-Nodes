<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Design (图片设计)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            margin: 0;
            cursor: default;
        }
        #main-toolbar {
            padding: 6px 10px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a4a;
            z-index: 30;
            user-select: none;
        }
        .tool-group {
            display: flex;
            gap: 4px;
            align-items: center;
            border-right: 1px solid #2a2a4a;
            padding-right: 10px;
        }
        .tool-group:last-child { border-right: none; }
        .tool-btn {
            padding: 5px;
            min-width: 30px;
            height: 30px;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
            background: rgba(255,255,255,0.06);
            color: #aaa;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            position: relative;
        }
        .tool-btn svg {
            width: 18px;
            height: 18px;
        }
        .tool-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.14);
            color: #fff;
        }
        .tool-btn.active {
            background: #2ecc71;
            color: #fff;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.25);
            border-color: rgba(46, 204, 113, 0.3);
        }
        .tool-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
        #upload-btn {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }
        #upload-btn:hover:not(:disabled) {
            background: rgba(46, 204, 113, 0.3);
        }
        #clear-btn { color: #e74c3c; }
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #cccccc;
            padding: 10px;
            position: relative;
        }
        #edit-canvas {
            border: 2px solid #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            touch-action: none;
            user-select: none;
            background: #f8f8f8;
            display: none;
            cursor: crosshair;
        }
        #brush-preview {
            position: absolute;
            border: 2px solid #0099ff;
            border-radius: 50%;
            background: rgba(0, 153, 255, 0.1);
            pointer-events: none;
            z-index: 20;
            display: none;
            transform: translate(-50%, -50%);
        }
        #status {
            padding: 4px 10px;
            background: #12121f;
            color: #2ecc71;
            font-size: 12px;
            text-align: left;
            flex-shrink: 0;
        }
        #image-input { display: none; }
    </style>
</head>
<body>
    <div id="main-toolbar">
        <div class="tool-group">
            <input type="file" id="image-input" accept="image/*">
            <button id="upload-btn" class="tool-btn" title="上传图片">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 9l5 -5l5 5"/><path d="M12 4l0 12"/></svg>
            </button>
            <button id="clear-btn" class="tool-btn" title="清除画布">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7l16 0"/><path d="M10 11l0 6"/><path d="M14 11l0 6"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg>
            </button>
            <button id="reset-btn" class="tool-btn" title="重置初始尺寸">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg>
            </button>
        </div>
        <div class="tool-group">
            <button id="draw-btn" class="tool-btn active" title="画笔">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21v-4a4 4 0 1 1 4 4h-4"/><path d="M21 3a16 16 0 0 0 -12.8 10.2"/><path d="M21 3a16 16 0 0 1 -10.2 12.8"/><path d="M10.6 9a9 9 0 0 1 4.4 4.4"/></svg>
            </button>
        </div>

    </div>

    <div id="canvas-container">
        <canvas id="edit-canvas"></canvas>
        <div id="brush-preview"></div>
    </div>

    <div id="status">🟢 图片设计就绪 | 在画布上绘画 | 滚轮缩放+中键平移</div>

    <script>
        const state = {
            currentTool: 'draw',
            isUploaded: false,
            isMouseDown: false,
            ctx: null,
            canvas: null,
            originalImage: null,
            canvasW: 512,
            canvasH: 512,
            initialW: 512,
            initialH: 512,
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            toolbarHeight: 0,
            drawColor: '#000000',
            drawSize: 5,
            drawAlpha: 1.0,
            prevDrawX: 0,
            prevDrawY: 0,
            brushPreview: null,
            undoStack: [],
            maxUndo: 20,
            finalImageBase64: "",
            cropWidth: 512,
            cropHeight: 512,
            zoom: 1.0,
            panX: 0,
            panY: 0,
            isPanning: false,
            panStartX: 0,
            panStartY: 0,
            panStartPanX: 0,
            panStartPanY: 0,
            resizeObserver: null
        };

        function initCanvas(w, h, saveInitial = true, preserveContent = true) {
            let savedImage = null;
            let oldW = state.canvasW;
            let oldH = state.canvasH;
            if (preserveContent && state.canvas && (oldW > 0 && oldH > 0) && (w !== oldW || h !== oldH)) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = oldW;
                tempCanvas.height = oldH;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(state.canvas, 0, 0);
                savedImage = tempCanvas.toDataURL();
            }

            state.canvas = document.getElementById('edit-canvas');
            state.ctx = state.canvas.getContext('2d');
            state.canvas.width = w;
            state.canvas.height = h;
            state.canvasW = w;
            state.canvasH = h;
            if (saveInitial) {
                state.initialW = w;
                state.initialH = h;
            }
            state.canvas.style.display = 'block';
            state.brushPreview = document.getElementById('brush-preview');
            state.zoom = 1.0;
            state.panX = 0;
            state.panY = 0;
            state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
            state.ctx.fillStyle = '#EEEEEE';
            state.ctx.fillRect(0, 0, w, h);
            if (!state.originalImage) {
                const blankCanvas = document.createElement('canvas');
                blankCanvas.width = w;
                blankCanvas.height = h;
                const blankCtx = blankCanvas.getContext('2d');
                blankCtx.fillStyle = '#EEEEEE';
                blankCtx.fillRect(0, 0, w, h);
                const blankImg = new Image();
                blankImg.onload = () => { state.originalImage = blankImg; };
                blankImg.src = blankCanvas.toDataURL();
            }

            if (savedImage) {
                const img = new Image();
                img.onload = () => {
                    const scaleX = w / oldW;
                    const scaleY = h / oldH;
                    const scale = Math.min(scaleX, scaleY);
                    const drawW = oldW * scale;
                    const drawH = oldH * scale;
                    const offsetX = (w - drawW) / 2;
                    const offsetY = (h - drawH) / 2;
                    state.ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                    state.originalImage = new Image();
                    state.originalImage.onload = () => {};
                    state.originalImage.src = state.canvas.toDataURL();
                    sendToParent(true);
                    setStatus('📐 画布已调整并等比缩放内容 | ' + w + 'x' + h);
                };
                img.src = savedImage;
            }

            updateCanvasScale();
            if (!savedImage) {
                setStatus('⚙️ 画布初始化完成 | ' + w + 'x' + h);
            }
        }

        function updateCanvasScale() {
            if (!state.canvas) return;
            const container = document.getElementById('canvas-container');
            const containerStyle = window.getComputedStyle(container);
            const padL = parseFloat(containerStyle.paddingLeft) || 0;
            const padR = parseFloat(containerStyle.paddingRight) || 0;
            const padT = parseFloat(containerStyle.paddingTop) || 0;
            const padB = parseFloat(containerStyle.paddingBottom) || 0;
            const contW = container.clientWidth - padL - padR;
            const contH = container.clientHeight - padT - padB;
            const fitScaleX = contW / state.canvasW;
            const fitScaleY = contH / state.canvasH;
            const fitScale = Math.min(fitScaleX, fitScaleY);
            state.scale = fitScale * state.zoom;
            const dispW = state.canvasW * state.scale;
            const dispH = state.canvasH * state.scale;
            const baseLeft = (contW - dispW) / 2 + padL;
            const baseTop = (contH - dispH) / 2 + padT;
            state.offsetX = baseLeft + state.panX;
            state.offsetY = baseTop + state.panY;
            state.canvas.style.width = dispW + 'px';
            state.canvas.style.height = dispH + 'px';
            state.canvas.style.left = state.offsetX + 'px';
            state.canvas.style.top = state.offsetY + 'px';
            state.canvas.style.position = 'absolute';
        }

        function getCanvasXY(clientX, clientY) {
            if (!state.canvas) return [0, 0];
            const rect = state.canvas.getBoundingClientRect();
            const x = (clientX - rect.left) / state.scale;
            const y = (clientY - rect.top) / state.scale;
            return [
                Math.max(0, Math.min(state.canvasW, x)),
                Math.max(0, Math.min(state.canvasH, y))
            ];
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function saveCanvasState() {
            if (!state.ctx || !state.canvas) return;
            try {
                const imageData = state.ctx.getImageData(0, 0, state.canvasW, state.canvasH);
                state.undoStack.push({ imageData, width: state.canvasW, height: state.canvasH });
                if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
            } catch (e) {}
        }

        function switchTool(tool) {
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            state.currentTool = tool;
            document.getElementById('draw-btn').classList.add('active');
            updateBrushPreviewSize();
            state.brushPreview.style.display = 'block';
            setStatus('🖌️ 画笔工具');
        }

        function updateBrushPreviewSize() {
            if (!state.brushPreview) return;
            const displaySize = state.drawSize * state.scale * 2;
            state.brushPreview.style.width = displaySize + 'px';
            state.brushPreview.style.height = displaySize + 'px';
        }

        function updateBrushPreviewPos(clientX, clientY) {
            if (!state.brushPreview || state.currentTool === 'none') return;
            const adjustedY = clientY - state.toolbarHeight;
            state.brushPreview.style.left = clientX + 'px';
            state.brushPreview.style.top = adjustedY + 'px';
        }

        function getCanvasBase64() {
            return state.canvas.toDataURL('image/png', 1.0);
        }

        function sendToParent(shouldUpdateSize = false) {
            state.finalImageBase64 = getCanvasBase64();
            const sendData = {
                final_image_base64: state.finalImageBase64,
                crop_width: state.canvasW,
                crop_height: state.canvasH
            };
            try {
                window.parent.postMessage({
                    type: 'DRAW_DATA_UPDATE',
                    data: JSON.stringify(sendData)
                }, '*');
                if (shouldUpdateSize) {
                    window.parent.postMessage({
                        type: 'UPDATE_CANVAS_SIZE',
                        width: state.canvasW,
                        height: state.canvasH
                    }, '*');
                }
            } catch (e) {
                setStatus('❌ 数据发送失败: ' + e.message);
            }
        }

        function execClear() {
            saveCanvasState();
            state.ctx.fillStyle = '#EEEEEE';
            state.ctx.fillRect(0, 0, state.canvasW, state.canvasH);
            state.isUploaded = false;
            state.originalImage = null;
            state.cropWidth = state.canvasW;
            state.cropHeight = state.canvasH;
            const blankCanvas = document.createElement('canvas');
            blankCanvas.width = state.canvasW;
            blankCanvas.height = state.canvasH;
            const blankCtx = blankCanvas.getContext('2d');
            blankCtx.fillStyle = '#EEEEEE';
            blankCtx.fillRect(0, 0, state.canvasW, state.canvasH);
            state.originalImage = new Image();
            state.originalImage.src = blankCanvas.toDataURL();
            sendToParent(false);
            setStatus('🧹 画布已完全清除');
        }

        function execReset() {
            if (state.canvasW === state.initialW && state.canvasH === state.initialH) {
                setStatus('ℹ️ 画布尺寸已是初始尺寸 (' + state.initialW + 'x' + state.initialH + ')');
                return;
            }
            saveCanvasState();
            let savedImage = null;
            if (state.canvas) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = state.canvasW;
                tempCanvas.height = state.canvasH;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(state.canvas, 0, 0);
                savedImage = tempCanvas.toDataURL();
            }
            initCanvas(state.initialW, state.initialH, false);
            if (savedImage) {
                const img = new Image();
                img.onload = () => {
                    const scaleX = state.canvasW / state.initialW;
                    const scaleY = state.canvasH / state.initialH;
                    const scale = Math.min(scaleX, scaleY, 1);
                    const drawW = state.initialW * scale;
                    const drawH = state.initialH * scale;
                    const offsetX = (state.canvasW - drawW) / 2;
                    const offsetY = (state.canvasH - drawH) / 2;
                    state.ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                    sendToParent(true);
                };
                img.src = savedImage;
            } else {
                sendToParent(true);
            }
            state.cropWidth = state.initialW;
            state.cropHeight = state.initialH;
            setStatus('🔄 已重置为初始尺寸 | ' + state.initialW + 'x' + state.initialH);
        }

        function hexToRgb(hex) {
            const v = parseInt(hex.slice(1), 16);
            return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
        }

        function drawSoftStamp(x, y) {
            const radius = state.drawSize / 2;
            if (radius < 0.5) return;
            const alpha = state.drawAlpha;
            const [r, g, b] = hexToRgb(state.drawColor);
            const grad = state.ctx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
            grad.addColorStop(0.25, `rgba(${r},${g},${b},${alpha * 0.95})`);
            grad.addColorStop(0.5, `rgba(${r},${g},${b},${alpha * 0.65})`);
            grad.addColorStop(0.75, `rgba(${r},${g},${b},${alpha * 0.25})`);
            grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
            state.ctx.save();
            state.ctx.fillStyle = grad;
            state.ctx.beginPath();
            state.ctx.arc(x, y, radius, 0, Math.PI * 2);
            state.ctx.fill();
            state.ctx.restore();
        }

        function initEvent() {
            document.getElementById('upload-btn').addEventListener('click', () => {
                document.getElementById('image-input').click();
            });
            document.getElementById('image-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        saveCanvasState();
                        initCanvas(img.width, img.height, false, false);
                        state.ctx.drawImage(img, 0, 0);
                        state.originalImage = img;
                        state.isUploaded = true;
                        state.cropWidth = img.width;
                        state.cropHeight = img.height;
                        sendToParent(true);
                        setStatus('✅ 图片上传成功 | 原始尺寸: ' + img.width + 'x' + img.height);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('clear-btn').onclick = () => execClear();
            document.getElementById('reset-btn').onclick = () => execReset();
            document.getElementById('draw-btn').onclick = () => switchTool('draw');

            document.addEventListener('mousemove', (e) => {
                if (state.isPanning) {
                    state.panX = state.panStartPanX + (e.clientX - state.panStartX);
                    state.panY = state.panStartPanY + (e.clientY - state.panStartY);
                    updateCanvasScale();
                    return;
                }
                updateBrushPreviewPos(e.clientX, e.clientY);
                if (!state.isMouseDown) return;
                const [x, y] = getCanvasXY(e.clientX, e.clientY);
                if (state.currentTool === 'draw') {
                    const dx = x - state.prevDrawX;
                    const dy = y - state.prevDrawY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const step = Math.max(1, Math.ceil(dist / (state.drawSize * 0.3)));
                    for (let i = 0; i <= step; i++) {
                        const t = i / step;
                        drawSoftStamp(state.prevDrawX + dx * t, state.prevDrawY + dy * t);
                    }
                    state.prevDrawX = x;
                    state.prevDrawY = y;
                }
            });

            const canvas = document.getElementById('edit-canvas');
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (e.button === 1) {
                    state.isPanning = true;
                    state.panStartX = e.clientX;
                    state.panStartY = e.clientY;
                    state.panStartPanX = state.panX;
                    state.panStartPanY = state.panY;
                    state.canvas.style.cursor = 'grabbing';
                    return;
                }
                state.isMouseDown = true;
                const [x, y] = getCanvasXY(e.clientX, e.clientY);
                if (state.currentTool === 'draw') {
                    saveCanvasState();
                    drawSoftStamp(x, y);
                    state.prevDrawX = x;
                    state.prevDrawY = y;
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (state.isPanning) {
                    state.isPanning = false;
                    state.canvas.style.cursor = 'crosshair';
                    return;
                }
                if (!state.isMouseDown) return;
                state.isMouseDown = false;
                if (state.currentTool === 'draw') {
                    sendToParent(false);
                }
            });

            canvas.addEventListener('mouseenter', (e) => {
                if (e.buttons === 1 && state.isMouseDown === false && state.currentTool === 'draw') {
                    state.isMouseDown = true;
                    const [x, y] = getCanvasXY(e.clientX, e.clientY);
                    drawSoftStamp(x, y);
                    state.prevDrawX = x;
                    state.prevDrawY = y;
                }
            });

            window.addEventListener('resize', () => {
                state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                updateCanvasScale();
                updateBrushPreviewSize();
            });

            if (window.ResizeObserver) {
                state.resizeObserver = new ResizeObserver(() => {
                    state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                    updateCanvasScale();
                    updateBrushPreviewSize();
                });
                state.resizeObserver.observe(document.getElementById('canvas-container'));
            }

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const oldScale = state.scale;
                const rect = state.canvas.getBoundingClientRect();
                const canvasPX = (e.clientX - rect.left) / oldScale;
                const canvasPY = (e.clientY - rect.top) / oldScale;
                const factor = e.deltaY > 0 ? 1 / 1.12 : 1.12;
                state.zoom = Math.max(0.1, Math.min(20, state.zoom * factor));
                updateCanvasScale();
                const newRect = state.canvas.getBoundingClientRect();
                state.panX += (e.clientX - newRect.left) - canvasPX * state.scale;
                state.panY += (e.clientY - newRect.top) - canvasPY * state.scale;
                updateCanvasScale();
                updateBrushPreviewSize();
                setStatus('🔍 缩放: ' + Math.round(state.zoom * 100) + '% | 滚轮缩放/中键平移');
            }, { passive: false });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    if (state.undoStack.length > 0) {
                        const entry = state.undoStack.pop();
                        if (entry.width !== state.canvasW || entry.height !== state.canvasH) {
                            state.canvas.width = entry.width;
                            state.canvas.height = entry.height;
                            state.canvasW = entry.width;
                            state.canvasH = entry.height;
                            state.cropWidth = entry.width;
                            state.cropHeight = entry.height;
                            updateCanvasScale();
                        }
                        state.ctx.putImageData(entry.imageData, 0, 0);
                        sendToParent(false);
                        setStatus('↩️ 已撤销 | 剩余历史: ' + state.undoStack.length + '步');
                    }
                }
            });
        }

        window.onload = () => {
            initCanvas(512, 512, false);
            initEvent();
            setTimeout(() => {
                window.parent.postMessage({type: 'DRAW_CANVAS_READY'}, '*');
            }, 100);
        };

        window.addEventListener('unload', () => {
            if (state.resizeObserver) state.resizeObserver.disconnect();
        });

        window.addEventListener('message', (e) => {
            try {
                if (e.data.type === 'INIT_CANVAS') {
                    initCanvas(e.data.width || 512, e.data.height || 512, true);
                } else if (e.data.type === 'RESIZE_CANVAS') {
                    state.toolbarHeight = document.getElementById('main-toolbar').offsetHeight;
                    updateCanvasScale();
                    updateBrushPreviewSize();
                }
            } catch (e) {
                console.error('处理父窗口消息失败:', e);
            }
        });
    </script>
</body>
</html>
